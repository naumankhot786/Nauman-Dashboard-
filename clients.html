<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Clients | Nauman Labs</title>

<link rel="stylesheet" href="clients.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<div class="topbar">

<h1>Clients</h1>

<button id="openForm">
<i class="fa-solid fa-plus"></i>
Add Client
</button>

</div>

<div class="search-box">

<input
type="text"
id="searchClient"
placeholder="Search Client...">

</div>

<table>

<thead>

<tr>

<th>Name</th>
<th>Company</th>
<th>Phone</th>
<th>Email</th>
<th>Actions</th>

</tr>

</thead>

<tbody id="clientTable">

</tbody>

</table>

<!-- Popup -->

<div id="clientPopup" class="popup">

<div class="popup-content">

<h2>Add Client</h2>

<input type="text" id="clientName" placeholder="Client Name">

<input type="text" id="clientCompany" placeholder="Company">

<input type="text" id="clientPhone" placeholder="Phone">

<input type="email" id="clientEmail" placeholder="Email">

<div class="buttons">

<button id="saveClient">Save</button>

<button id="closePopup">Cancel</button>

</div>

</div>

</div>

<script type="module" src="clients.js"></script>

</body>
</html>
