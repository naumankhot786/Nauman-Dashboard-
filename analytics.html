<!DOCTYPE html>
<html lang="en">

<head>
  
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <title>Analytics - Nauman Labs</title>
  
  <link rel="stylesheet" href="analytics.css">
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
  
</head>

<body>
  
  <div class="sidebar">
    
    <div class="logo">
      
      <img src="logo.png" alt="Logo">
      
      <h2>Nauman Labs</h2>
      
    </div>
    
    <ul>
      
      <li><a href="dashboard.html"><i class="fa-solid fa-house"></i> Dashboard</a></li>
      
      <li><a href="clients.html"><i class="fa-solid fa-users"></i> Clients</a></li>
      
      <li><a href="projects.html"><i class="fa-solid fa-folder"></i> Projects</a></li>
      
      <li><a href="payments.html"><i class="fa-solid fa-wallet"></i> Payments</a></li>
      
      <li><a href="messages.html"><i class="fa-solid fa-envelope"></i> Messages</a></li>
      
      <li class="active"><a href="analytics.html"><i class="fa-solid fa-chart-line"></i> Analytics</a></li>
      
      <li><a href="settings.html"><i class="fa-solid fa-gear"></i> Settings</a></li>
      
    </ul>
    
  </div>
  
  <div class="main">
    
    <h1>📊 Analytics</h1>
    
    <div class="cards">
      
      <div class="card">
        <h3>Total Clients</h3>
        <h2 id="clientsTotal">0</h2>
      </div>
      
      <div class="card">
        <h3>Total Projects</h3>
        <h2 id="projectsTotal">0</h2>
      </div>
      
      <div class="card">
        <h3>Total Revenue</h3>
        <h2 id="revenueTotal">₹0</h2>
      </div>
      
      <div class="card">
        <h3>Total Messages</h3>
        <h2 id="messagesTotal">0</h2>
      </div>
      
    </div>
    
  </div>
  
  <script type="module" src="analytics.js"></script>
  
</body>

</html>
